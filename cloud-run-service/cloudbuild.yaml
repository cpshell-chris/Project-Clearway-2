steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/advance-appointment-service:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/advance-appointment-service:latest'
      - '.'
    dir: 'cloud-run-service'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/advance-appointment-service'

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'advance-appointment-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/advance-appointment-service:$COMMIT_SHA'
      - '--region'
      - 'us-east4'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/advance-appointment-service'
